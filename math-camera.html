<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathLens — Calcul en direct</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #2a2a3a;
    --accent: #00ffa3;
    --accent2: #7c3aed;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --danger: #ff4757;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    gap: 20px;
  }

  header {
    text-align: center;
    animation: fadeDown 0.6s ease;
  }

  header h1 {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), #00cfff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header p {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 900px;
  }

  @media (max-width: 640px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }

  .panel-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Camera */
  #video-wrap {
    position: relative;
    aspect-ratio: 4/3;
    background: #000;
    overflow: hidden;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #canvas { display: none; }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top: 0;
    animation: scan 2.5s ease-in-out infinite;
    pointer-events: none;
    opacity: 0;
  }

  .scan-line.active { opacity: 1; }

  @keyframes scan {
    0%   { top: 0%; }
    100% { top: 100%; }
  }

  .corner {
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.7;
  }
  .corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  .camera-status {
    position: absolute;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--accent);
    letter-spacing: 2px;
    background: rgba(0,0,0,0.6);
    padding: 4px 10px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
  }

  /* Controls */
  .controls {
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  button {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    padding: 10px 18px;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  #btn-capture {
    background: var(--accent);
    color: #000;
    flex: 1;
  }
  #btn-capture:hover { background: #00e090; transform: translateY(-1px); }
  #btn-capture:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  #btn-auto {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    flex: 1;
  }
  #btn-auto.on { border-color: var(--accent2); color: var(--accent2); background: rgba(124,58,237,0.1); }
  #btn-auto:hover { border-color: var(--accent2); }

  /* Result panel */
  .result-panel {
    padding: 16px;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .expression-box {
    background: rgba(0,255,163,0.05);
    border: 1px solid rgba(0,255,163,0.2);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .expression-box .label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .expression-box .expr {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    color: var(--text);
    word-break: break-all;
  }

  .answer-box {
    background: rgba(124,58,237,0.08);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .answer-box .label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: #a78bfa;
    text-transform: uppercase;
  }

  .answer-box .answer {
    font-family: 'Space Mono', monospace;
    font-size: 1.8rem;
    font-weight: 700;
    color: #a78bfa;
  }

  .steps-box {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* History */
  .history-panel {
    width: 100%;
    max-width: 900px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.5s ease;
  }

  .history-list {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
    overflow-y: auto;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    padding: 8px 12px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    animation: fadeIn 0.3s ease;
  }

  .history-item .expr { color: var(--muted); }
  .history-item .res { color: var(--accent); font-weight: 700; }

  .loading-dots {
    display: inline-flex; gap: 4px;
  }
  .loading-dots span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .empty-state {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    text-align: center;
    padding: 32px 16px;
    letter-spacing: 1px;
  }

  #start-btn {
    background: var(--accent);
    color: #000;
    font-size: 1rem;
    padding: 14px 32px;
    border-radius: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  #start-btn:hover { background: #00e090; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,255,163,0.25); }

  .error-text { color: var(--danger); font-size: 0.8rem; font-family: 'Space Mono', monospace; }
</style>
</head>
<body>

<header>
  <h1>MathLens</h1>
  <p>Calcul mathématique en direct par IA</p>
</header>

<div class="main-grid">
  <!-- Camera panel -->
  <div class="panel">
    <div class="panel-label">// Caméra en direct</div>
    <div id="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="scan-line" id="scan-line"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="camera-status" id="cam-status">EN ATTENTE</div>
    </div>
    <div class="controls">
      <button id="btn-capture" disabled>📸 Capturer & Calculer</button>
      <button id="btn-auto" id="btn-auto">⏱ Auto</button>
    </div>
    <div style="padding: 0 16px 14px; display:flex; justify-content:center;">
      <button id="start-btn">Activer la caméra</button>
    </div>
  </div>

  <!-- Result panel -->
  <div class="panel">
    <div class="panel-label">// Résultat IA</div>
    <div class="result-panel" id="result-panel">
      <div class="empty-state">Pointez votre caméra vers<br>une expression mathématique</div>
    </div>
  </div>
</div>

<!-- History -->
<div class="history-panel">
  <div class="panel-label">// Historique des calculs</div>
  <div class="history-list" id="history-list">
    <div class="empty-state">Aucun calcul effectué</div>
  </div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const btnCapture = document.getElementById('btn-capture');
const btnAuto = document.getElementById('btn-auto');
const startBtn = document.getElementById('start-btn');
const resultPanel = document.getElementById('result-panel');
const historyList = document.getElementById('history-list');
const camStatus = document.getElementById('cam-status');
const scanLine = document.getElementById('scan-line');

let stream = null;
let autoInterval = null;
let isProcessing = false;
let history = [];
let cameraActive = false;

// Hidden file input for iOS fallback
const fileInput = document.createElement('input');
fileInput.type = 'file';
fileInput.accept = 'image/*';
fileInput.capture = 'environment';
fileInput.style.display = 'none';
document.body.appendChild(fileInput);

let useFileMode = false;

startBtn.addEventListener('click', async () => {
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error('Non supporté');
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:720} }, audio: false });
    video.srcObject = stream;
    await video.play();
    cameraActive = true;
    useFileMode = false;
    btnCapture.disabled = false;
    camStatus.textContent = 'ACTIF';
    startBtn.style.display = 'none';
  } catch(e) {
    // Fallback: file input opens native camera on mobile
    useFileMode = true;
    cameraActive = true;
    camStatus.textContent = 'MODE PHOTO';
    camStatus.style.color = 'var(--accent)';
    startBtn.style.display = 'none';
    btnCapture.disabled = false;
    const wrap = document.getElementById('video-wrap');
    wrap.innerHTML += `<div id="cam-overlay" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,0.75);">
      <span style="font-size:2.8rem;">📷</span>
      <span style="font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--accent);letter-spacing:2px;text-align:center;">APPUYEZ SUR<br>"CAPTURER & CALCULER"</span>
    </div>`;
  }
});

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = async () => {
      canvas.width = img.width;
      canvas.height = img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
      // Show preview in video wrap
      const wrap = document.getElementById('video-wrap');
      let pi = wrap.querySelector('img.preview-img');
      if (!pi) {
        pi = document.createElement('img');
        pi.className = 'preview-img';
        pi.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;';
        wrap.appendChild(pi);
      }
      pi.src = e.target.result;
      const overlay = document.getElementById('cam-overlay');
      if (overlay) overlay.style.display = 'none';
      await analyzeCanvas();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

btnCapture.addEventListener('click', () => {
  if (isProcessing) return;
  if (useFileMode) {
    fileInput.value = '';
    fileInput.click();
  } else {
    captureAndAnalyze();
  }
});

btnAuto.addEventListener('click', () => {
  if (useFileMode) return; // Auto not available in file mode
  if (autoInterval) {
    clearInterval(autoInterval);
    autoInterval = null;
    btnAuto.classList.remove('on');
    btnAuto.textContent = '⏱ Auto';
    scanLine.classList.remove('active');
  } else {
    autoInterval = setInterval(() => {
      if (!isProcessing) captureAndAnalyze();
    }, 4000);
    btnAuto.classList.add('on');
    btnAuto.textContent = '⏹ Stop Auto';
    scanLine.classList.add('active');
    captureAndAnalyze();
  }
});

async function captureAndAnalyze() {
  if (!cameraActive || isProcessing) return;
  isProcessing = true;
  btnCapture.disabled = true;
  camStatus.textContent = 'ANALYSE...';

  // Capture frame from live video
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  await analyzeCanvas();
}

async function analyzeCanvas() {
  const imageData = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

  // Show loading state
  resultPanel.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;padding:16px 0;">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <span style="font-family:'Space Mono',monospace;font-size:0.8rem;color:var(--muted);">Analyse en cours...</span>
    </div>`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            {
              type: "image",
              source: { type: "base64", media_type: "image/jpeg", data: imageData }
            },
            {
              type: "text",
              text: `Tu es un moteur de calcul mathématique. Analyse cette image et :
1. Identifie toutes les expressions ou opérations mathématiques visibles (additions, soustractions, multiplications, divisions, équations, fractions, etc.)
2. Résous-les étape par étape
3. Donne le résultat final

Réponds UNIQUEMENT en JSON, sans balises markdown, au format :
{
  "found": true ou false,
  "expression": "l'expression trouvée (ex: 3 × 4 + 2)",
  "result": "le résultat final (ex: 14)",
  "steps": "explication courte des étapes (2-3 lignes max)",
  "error": null ou message d'erreur
}`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.map(i => i.text || '').join('') || '';

    let parsed;
    try {
      const clean = text.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch {
      parsed = { found: false, error: "Réponse inattendue de l'IA" };
    }

    if (!parsed.found || parsed.error) {
      resultPanel.innerHTML = `
        <div class="empty-state">
          Aucune expression mathématique détectée.<br>
          <span style="font-size:0.65rem;margin-top:6px;display:block;">${parsed.error || 'Essayez de pointer vers un calcul écrit.'}</span>
        </div>`;
    } else {
      resultPanel.innerHTML = `
        <div class="expression-box">
          <div class="label">// Expression détectée</div>
          <div class="expr">${escHtml(parsed.expression)}</div>
        </div>
        <div class="answer-box">
          <div class="label">Résultat</div>
          <div class="answer">${escHtml(parsed.result)}</div>
        </div>
        ${parsed.steps ? `<div class="steps-box">${escHtml(parsed.steps)}</div>` : ''}
      `;

      addHistory(parsed.expression, parsed.result);
    }

    camStatus.textContent = 'PRÊT';
  } catch(e) {
    resultPanel.innerHTML = `<div class="error-text" style="padding:16px;">Erreur: ${e.message}</div>`;
    camStatus.textContent = 'ERREUR';
  }

  isProcessing = false;
  btnCapture.disabled = false;
}

function addHistory(expr, result) {
  history.unshift({ expr, result, time: new Date().toLocaleTimeString('fr', {hour:'2-digit',minute:'2-digit',second:'2-digit'}) });
  if (history.length > 20) history.pop();

  historyList.innerHTML = history.map(h => `
    <div class="history-item">
      <span class="expr">${escHtml(h.expr)}</span>
      <span style="display:flex;align-items:center;gap:12px;">
        <span class="res">= ${escHtml(h.result)}</span>
        <span style="color:var(--muted);font-size:0.6rem;">${h.time}</span>
      </span>
    </div>
  `).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
